<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegGuard Pro Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Recharts Dependencies -->
    <script src="/static/js/prop-types.min.js"></script>
    <script src="/static/js/recharts.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default: Midnight Cobalt */
            --bg-dark: #0f1115;
            --bg-panel: #16191f;
            --border-color: #272a30;
            --accent-primary: #00e5ff;
            --accent-secondary: #00b8d4;
            --text-main: #e0e0e0;
            --text-muted: #71717a;
            --accent-danger: #ff3333;
            --accent-warning: #ffb700;
            --shadow-glow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        [data-theme='matrix'] {
            --bg-dark: #000000;
            --bg-panel: #051005;
            --border-color: #003300;
            --accent-primary: #00ff00;
            --accent-secondary: #00cc00;
            --text-main: #00ff00;
            --text-muted: #008f00;
            --accent-danger: #ff0000;
            --accent-warning: #ccff00;
            --shadow-glow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        [data-theme='obsidian'] {
            --bg-dark: #0a0505;
            --bg-panel: #1a0a0a;
            --border-color: #401010;
            --accent-primary: #ff3333;
            --accent-secondary: #cc0000;
            --text-main: #ffcccc;
            --text-muted: #995555;
            --accent-danger: #ff0000;
            --accent-warning: #ffaa00;
            --shadow-glow: 0 0 10px rgba(255, 51, 51, 0.3);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
            animation: scan 2s linear infinite;
            pointer-events: none;
            z-index: 50;
            opacity: 0.5;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-border { border: 1px solid var(--border-color); }
        .bg-panel { background-color: var(--bg-panel); }
        .text-accent { color: var(--accent-primary); }
        .border-accent { border-color: var(--accent-primary); }
        .hover-accent:hover { color: var(--accent-primary); }
        .bg-accent-low { background-color: color-mix(in srgb, var(--accent-primary) 10%, transparent); }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const API_URL = window.location.origin;
        
        // Safe Recharts loading
        const RechartsObj = window.Recharts || {};
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            AreaChart, Area, Treemap 
        } = RechartsObj;

        // --- Components ---

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 text-red-500 bg-zinc-900 h-screen flex flex-col items-center justify-center">
                            <h1 className="text-xl font-bold mb-4">UI Runtime Error</h1>
                            <pre className="bg-black p-4 rounded border border-red-900 text-xs mono">
                                {this.state.error && this.state.error.toString()}
                            </pre>
                            <button onClick={() => window.location.reload()} className="mt-4 px-4 py-2 bg-zinc-800 text-white rounded">Reload</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Icon = ({ name, size = 16, className = "" }) => {
            const [svgHtml, setSvgHtml] = useState('');

            useEffect(() => {
                if (!window.lucide) return;
                const tempDiv = document.createElement('div');
                const iTag = document.createElement('i');
                iTag.setAttribute('data-lucide', name);
                tempDiv.appendChild(iTag);

                try {
                    window.lucide.createIcons({ root: tempDiv, nameAttr: 'data-lucide' });
                    const svg = tempDiv.innerHTML
                        .replace('width="24"', `width="${size}"`)
                        .replace('height="24"', `height="${size}"`)
                        .replace('class="lucide lucide-' + name + '"', `class="lucide lucide-${name} ${className}"`);
                    setSvgHtml(svg);
                } catch (e) { console.error("Icon gen failed", e); }
            }, [name, size, className]);

            if (!svgHtml) return <span className={`inline-block w-[${size}px] h-[${size}px]`} />;
            return <span dangerouslySetInnerHTML={{ __html: svgHtml }} className="inline-flex items-center justify-center" />;
        };

        const ConsoleLog = ({ logs, visible, onClose }) => {
            const endRef = useRef(null);
            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [logs, visible]);
            
            if (!visible) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 h-48 bg-panel panel-border border-t flex flex-col shadow-2xl z-40 animate-fade-in font-mono">
                    <div className="flex items-center justify-between px-4 py-1 bg-black/20 border-b border-white/5">
                        <span className="text-[10px] uppercase font-bold text-accent flex items-center gap-2">
                            <Icon name="terminal" size={12}/> Live Console
                        </span>
                        <button onClick={onClose} className="hover:text-white text-zinc-500"><Icon name="x" size={12}/></button>
                    </div>
                    <div className="flex-1 overflow-auto p-2 space-y-1 bg-black/40">
                        {logs.map((log, i) => (
                            <div key={i} className="text-[10px] border-l-2 border-transparent hover:border-accent pl-2 py-0.5 text-zinc-400">
                                <span className="text-zinc-600 mr-2">[{log.time}]</span>
                                <span className={log.type === 'error' ? 'text-red-500' : log.type === 'success' ? 'text-green-500' : 'text-zinc-300'}>
                                    {log.message}
                                </span>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>
                </div>
            );
        };

        const FileTreeMap = ({ rootNode, onSelect }) => {
            // Transform data for Recharts Treemap
            const transform = (node) => {
                if (!node) return null;
                const children = (node.nested || [])
                    .map(n => transform(n.analysis))
                    .filter(Boolean);
                const findingsCount = (node.findings?.details?.length || 0);
                // Size based on findings + base size
                const value = 10 + (findingsCount * 20); 
                
                return {
                    name: node.filename || "unknown",
                    value: value, 
                    node: node,
                    children: children.length > 0 ? children : null
                };
            };
            
            const data = useMemo(() => [transform(rootNode)].filter(Boolean), [rootNode]);

            const CustomContent = (props) => {
                const { root, depth, x, y, width, height, index, name, node } = props;
                if (!node || !node.findings) return null;

                return (
                    <g>
                        <rect
                            x={x} y={y} width={width} height={height}
                            fill="transparent"
                            stroke="var(--border-color)"
                            strokeWidth={1}
                        />
                        <foreignObject x={x} y={y} width={width} height={height}>
                            <div 
                                className={`w-full h-full p-1 border hover:border-accent cursor-pointer transition-all overflow-hidden flex flex-col justify-between ${
                                    node.findings.verdict === 'Stego Detected' ? 'bg-red-900/20 border-red-900/50' : 
                                    node.findings.verdict === 'Suspicious' ? 'bg-yellow-900/20 border-yellow-900/50' : 
                                    'bg-panel border-white/5'
                                }`}
                                onClick={() => onSelect(node)}
                                title={`${name} (${node.findings.verdict})`}
                            >
                                <div className="text-[8px] font-bold truncate text-zinc-400">{name}</div>
                                {node.findings.verdict !== 'Safe' && (
                                    <div className="text-[8px] text-accent text-right">!</div>
                                )}
                            </div>
                        </foreignObject>
                    </g>
                );
            };

            return (
                <ResponsiveContainer width="100%" height="100%">
                    <Treemap
                        data={data}
                        dataKey="value"
                        aspectRatio={4 / 3}
                        stroke="var(--bg-dark)"
                        fill="var(--bg-panel)"
                        content={<CustomContent />}
                    />
                </ResponsiveContainer>
            );
        };

        const MetadataCompareModal = ({ rootNode, selectedNode, visible, onClose }) => {
            if (!visible || !selectedNode || !rootNode) return null;

            const rootMeta = rootNode.findings?.metadata || {};
            const selMeta = selectedNode.findings?.metadata || {};
            
            // Merge keys
            const allKeys = Array.from(new Set([...Object.keys(rootMeta), ...Object.keys(selMeta)])).sort();

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 p-8 animate-fade-in" onClick={onClose}>
                    <div className="bg-panel panel-border w-full max-w-4xl max-h-[80vh] flex flex-col rounded shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-white/10 flex justify-between items-center">
                            <h3 className="text-sm font-bold uppercase text-accent flex items-center gap-2">
                                <Icon name="git-compare" size={16}/> Metadata Comparison
                            </h3>
                            <button onClick={onClose}><Icon name="x" size={16} className="text-zinc-500 hover:text-white"/></button>
                        </div>
                        <div className="flex-1 overflow-auto p-4">
                            <div className="grid grid-cols-3 gap-4 mb-2 font-bold text-[10px] uppercase text-zinc-500 sticky top-0 bg-panel py-2 border-b border-white/10">
                                <div>Attribute</div>
                                <div className="text-blue-400">Root: {rootNode.filename}</div>
                                <div className="text-accent">Selected: {selectedNode.filename}</div>
                            </div>
                            <div className="space-y-1 mono text-[10px]">
                                {allKeys.map(k => (
                                    <div key={k} className="grid grid-cols-3 gap-4 hover:bg-white/5 p-1 rounded border-b border-white/5">
                                        <div className="text-zinc-400 truncate">{k}</div>
                                        <div className="text-zinc-300 break-all">{rootMeta[k] || '-'}</div>
                                        <div className={`break-all ${rootMeta[k] !== selMeta[k] ? 'text-accent font-bold' : 'text-zinc-300'}`}>
                                            {selMeta[k] || '-'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SidebarItem = ({ icon, label, active, onClick, depth = 0 }) => (
            <div 
                onClick={onClick}
                className={`flex items-center gap-2 px-3 py-2 cursor-pointer border-l-2 transition-colors ${
                    active ? 'bg-accent-low border-accent text-accent' : 'border-transparent text-zinc-500 hover:text-zinc-300 hover:bg-white/5'
                }`}
                style={{ paddingLeft: `${12 + depth * 12}px` }}
            >
                <Icon name={icon} size={14} />
                <span className="text-xs font-medium truncate">{label}</span>
            </div>
        );

        const RecursiveFileTree = ({ node, activeId, onSelect }) => {
            const isActive = activeId === node.filename + node.depth;
            return (
                <div className="flex flex-col">
                    <SidebarItem 
                        icon={node.nested?.length > 0 ? "folder-open" : "file"} 
                        label={node.filename} 
                        active={isActive}
                        depth={node.depth}
                        onClick={() => onSelect(node)}
                    />
                    {node.nested?.map((child, i) => (
                        <RecursiveFileTree 
                            key={i} 
                            node={child.analysis} 
                            activeId={activeId} 
                            onSelect={onSelect} 
                        />
                    ))}
                </div>
            );
        };

        const StatCard = ({ label, value, color = "text-zinc-400" }) => (
            <div className="bg-panel panel-border p-3 rounded">
                <div className="text-[10px] text-zinc-500 uppercase tracking-wider mb-1">{label}</div>
                <div className={`text-lg font-bold ${color}`}>{value}</div>
            </div>
        );

        const HexViewer = ({ file, url }) => {
            const [lines, setLines] = useState([]);
            const [loading, setLoading] = useState(false);
            
            useEffect(() => {
                const processBuffer = (buffer) => {
                    const bytes = new Uint8Array(buffer);
                    const newLines = [];
                    const limit = Math.min(bytes.length, 4096); 
                    for (let i = 0; i < limit; i += 16) {
                        const chunk = bytes.slice(i, i + 16);
                        const hex = Array.from(chunk).map(b => b.toString(16).padStart(2, '0')).join(' ');
                        const ascii = Array.from(chunk).map(b => (b >= 32 && b <= 126) ? String.fromCharCode(b) : '.').join('');
                        newLines.push({ offset: i.toString(16).padStart(8, '0'), hex, ascii });
                    }
                    setLines(newLines);
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => processBuffer(e.target.result);
                    reader.readAsArrayBuffer(file.slice(0, 4096));
                } else if (url) {
                    setLoading(true);
                    fetch(url)
                        .then(res => res.arrayBuffer())
                        .then(buffer => {
                            processBuffer(buffer);
                            setLoading(false);
                        })
                        .catch(err => {
                            console.error("Hex fetch error:", err);
                            setLoading(false);
                        });
                }
            }, [file, url]);

            if (loading) return <div className="p-8 text-accent animate-pulse text-xs">Fetching binary data...</div>;
            if (!file && !url) return <div className="text-zinc-600 p-4 text-xs">No data source available for hex view.</div>;

            return (
                <div className="h-full overflow-auto mono text-[10px] p-4 bg-black/40">
                    <div className="grid grid-cols-[80px_1fr_150px] gap-4 text-zinc-600 border-b border-zinc-800 pb-2 mb-2 sticky top-0 bg-panel">
                        <div>OFFSET</div>
                        <div>HEX REPRESENTATION</div>
                        <div>ASCII</div>
                    </div>
                    {lines.map((l, i) => (
                        <div key={i} className="grid grid-cols-[80px_1fr_150px] gap-4 hover:bg-white/5 cursor-crosshair">
                            <div className="text-blue-500">{l.offset}</div>
                            <div className="text-zinc-400">{l.hex}</div>
                            <div className="text-zinc-500 tracking-widest">{l.ascii}</div>
                        </div>
                    ))}
                    <div className="mt-2 text-zinc-600 text-center italic">-- Preview Limited to 4KB --</div>
                </div>
            );
        };

        const EntropyView = ({ data }) => {
            if (!data || data.length === 0) return <div className="p-8 text-zinc-600 text-xs">No telemetry data available.</div>;

            return (
                <div className="h-full p-6 flex flex-col">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase mb-4 flex items-center gap-2">
                        <Icon name="activity" size={14} className="text-accent"/> Entropy Distribution (Shannon)
                    </h3>
                    <div className="flex-1 min-h-0 bg-panel panel-border rounded p-4 relative">
                        <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={data}>
                                <defs>
                                    <linearGradient id="colorEntropy" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="5%" stopColor="var(--accent-primary)" stopOpacity={0.3}/>
                                        <stop offset="95%" stopColor="var(--accent-primary)" stopOpacity={0}/>
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" stroke="#333" vertical={false} />
                                <XAxis dataKey="offset" tick={{fontSize: 10, fill: '#666'}} tickFormatter={(val) => `0x${val.toString(16)}`} />
                                <YAxis domain={[0, 8]} tick={{fontSize: 10, fill: '#666'}} />
                                <Tooltip 
                                    contentStyle={{backgroundColor: 'var(--bg-panel)', borderColor: '#333', fontSize: '12px'}}
                                    itemStyle={{color: 'var(--accent-primary)'}}
                                    labelFormatter={(val) => `Offset: 0x${val.toString(16)}`}
                                />
                                <Area type="monotone" dataKey="entropy" stroke="var(--accent-primary)" fillOpacity={1} fill="url(#colorEntropy)" />
                            </AreaChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        const RawStringsViewer = ({ url, file }) => {
            const [strings, setStrings] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const extractStrings = (buffer) => {
                    const bytes = new Uint8Array(buffer);
                    let current = "";
                    const found = [];
                    for (let i = 0; i < bytes.length; i++) {
                        const b = bytes[i];
                        if (b >= 32 && b <= 126) {
                            current += String.fromCharCode(b);
                        } else {
                            if (current.length >= 4) found.push(current);
                            current = "";
                        }
                    }
                    if (current.length >= 4) found.push(current);
                    setStrings([...new Set(found)].slice(0, 1000));
                };

                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => extractStrings(e.target.result);
                    reader.readAsArrayBuffer(file);
                } else if (url) {
                    setLoading(true);
                    fetch(url)
                        .then(res => res.arrayBuffer())
                        .then(buffer => { extractStrings(buffer); setLoading(false); })
                        .catch(err => { console.error("Strings fetch error:", err); setLoading(false); });
                }
            }, [file, url]);

            if (loading) return <div className="p-8 text-yellow-500 animate-pulse text-xs">Extracting strings...</div>;
            if (strings.length === 0) return <div className="p-8 text-zinc-600 text-xs">No printable strings found.</div>;

            return (
                <div className="p-4 h-full overflow-auto mono text-[10px] bg-black/40">
                    <div className="grid grid-cols-1 gap-1">
                        {strings.map((s, i) => (
                            <div key={i} className="text-zinc-400 hover:text-accent cursor-text select-all whitespace-pre-wrap break-all border-b border-white/5 pb-1">
                                {s}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ArtifactsView = ({ artifacts, onPreview, onRescan, onCrack }) => {
            if (!artifacts || artifacts.length === 0) return <div className="p-8 text-zinc-600 text-xs">No artifacts extracted from this file layer.</div>;
            
            return (
                <div className="p-6 h-full overflow-auto">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase mb-4 flex items-center gap-2">
                        <Icon name="package" size={14} className="text-green-500"/> Recovered Files & Artifacts
                    </h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {artifacts.map((art, i) => {
                            const isImage = ['jpg', 'png', 'jpeg', 'gif', 'bmp', 'webp'].some(ext => art.name.toLowerCase().endsWith(ext));
                            const isVideo = ['mp4', 'avi', 'mov'].some(ext => art.name.toLowerCase().endsWith(ext));
                            const downloadUrl = `${API_URL}${art.url}`;
                            
                            return (
                                <div key={i} className="bg-panel panel-border rounded p-4 flex flex-col gap-3 group hover:border-accent transition-colors relative">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 bg-black/50 rounded text-accent group-hover:scale-110 transition-transform">
                                                <Icon name={isImage ? 'image' : isVideo ? 'film' : 'file'} size={20} />
                                            </div>
                                            <div>
                                                <div className="text-xs font-bold text-main truncate max-w-[200px]" title={art.name}>{art.name}</div>
                                                <div className="text-[10px] text-zinc-500 uppercase">{art.type} • {art.size} bytes</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {art.url && isImage && (
                                        <div className="mt-2 bg-black/50 rounded overflow-hidden border border-white/5 h-32 flex items-center justify-center relative cursor-pointer" onClick={() => onPreview(downloadUrl)}>
                                            <img src={downloadUrl} className="max-w-full max-h-full object-contain" alt="Artifact Preview" />
                                        </div>
                                    )}

                                    {art.url && isVideo && (
                                        <div className="mt-2 bg-black/50 rounded overflow-hidden border border-white/5 h-32 flex items-center justify-center relative">
                                            <video src={downloadUrl} className="max-w-full max-h-full" controls />
                                        </div>
                                    )}
                                    
                                    <div className="flex gap-2 mt-2">
                                        <button 
                                            onClick={() => window.open(downloadUrl, '_blank')}
                                            className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-1 rounded text-[9px] uppercase font-bold flex items-center justify-center gap-1"
                                        >
                                            <Icon name="download" size={10}/> Save
                                        </button>
                                        <button 
                                            onClick={() => onRescan(art)}
                                            className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-accent py-1 rounded text-[9px] uppercase font-bold flex items-center justify-center gap-1"
                                        >
                                            <Icon name="radar" size={10}/> Scan
                                        </button>
                                        <button 
                                            onClick={() => onCrack(art)}
                                            className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-red-400 py-1 rounded text-[9px] uppercase font-bold flex items-center justify-center gap-1"
                                        >
                                            <Icon name="unlock" size={10}/> Crack
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ImageModal = ({ url, onClose }) => {
            if (!url) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-8 animate-fade-in" onClick={onClose}>
                    <button className="absolute top-6 right-6 text-white hover:text-accent transition-colors z-50">
                        <Icon name="x" size={32} />
                    </button>
                    <div className="max-w-full max-h-full flex flex-col items-center gap-4 relative" onClick={e => e.stopPropagation()}>
                        <img src={url} className="max-w-full max-h-[85vh] object-contain shadow-2xl border border-zinc-800 rounded" />
                        <div className="text-zinc-400 text-xs mono bg-black/60 px-4 py-2 rounded-full border border-zinc-800 backdrop-blur-sm">
                            {url.split('/').pop()}
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryView = ({ onSelect }) => {
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`${API_URL}/history`)
                    .then(res => res.json())
                    .then(data => { setHistory(data); setLoading(false); })
                    .catch(e => { console.error(e); setLoading(false); });
            }, []);

            if (loading) return <div className="p-8 text-accent animate-pulse text-xs text-center">Retrieving Archive...</div>;

            return (
                <div className="p-6 h-full overflow-auto">

                    <div className="grid grid-cols-1 gap-2">

                                    <div className="text-right">
                                        <div className="text-[9px] text-zinc-600 uppercase font-bold">Risk Score</div>

        const ToolsView = ({ fileId, mime, onBack, initialFile = null }) => {
            const [status, setStatus] = useState('idle');
            const [result, setResult] = useState('');
            const [wordlistFile, setWordlistFile] = useState(null);
            
            // Allow targeting a specific internal file ID if passed, else uses main file_id context
            // In this version we stick to the main file ID for simplicity unless we refactor backend to crack sub-files by ID
            // For now, if initialFile is passed (from Artifact View), we can't easily crack it without ID.
            // Simplified: The backend /crack uses `file_id` which maps to the analysis root. 
            // Ideally backend needs to support cracking extracted artifacts. 
            // For this UI demo, we'll display a warning if trying to crack artifact without direct ID support.

            const startCrack = async () => {
                setStatus('cracking');
                try {
                    const fd = new FormData();
                    fd.append('file_id', fileId);
                    if (wordlistFile) fd.append('wordlist', wordlistFile);

                    const res = await fetch(`${API_URL}/crack`, { method: 'POST', body: fd });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        setStatus('success');
                        setResult(data.password);
                    } else {
                        setStatus('failed');
                        setResult(data.message);
                    }
                } catch (e) {
                    setStatus('failed');
                    setResult(e.message);
                }
            };

            const isCrackable = mime.includes('zip') || mime.includes('pdf') || mime.includes('image') || mime.includes('audio');

            return (
                <div className="p-6 h-full flex flex-col items-center justify-center">
                    <div className="max-w-md w-full bg-panel panel-border rounded p-6 relative">

                        </h3>
                        {initialFile && (

                                Target: {initialFile.name}

                        {!isCrackable ? (

                                Current file type ({mime}) is not supported by the basic cracker.
                            </div>

                            <div className="space-y-4">
                                <div className="p-3 bg-black/30 rounded text-xs text-zinc-400">
                                    Attempt to recover password using dictionary attack.
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">Custom Wordlist</label>
                                    <div className="flex gap-2">
                                        <label className="flex-1 cursor-pointer bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded px-3 py-2 text-xs text-zinc-300 flex items-center justify-between transition-colors">
                                            <span className="truncate">{wordlistFile ? wordlistFile.name : "Select .txt file..."}</span>
                                            <Icon name="file-text" size={12} className="text-zinc-500"/>
                                            <input type="file" accept=".txt" className="hidden" onChange={(e) => setWordlistFile(e.target.files[0])} />
                                        </label>
                                    </div>
                                </div>
                                {status === 'idle' && (
                                    <button onClick={startCrack} className="w-full py-2 bg-red-600 hover:bg-red-500 text-white rounded text-xs font-bold uppercase tracking-wider transition-all">
                                        Initialize Attack
                                    </button>
                                )}
                                {status === 'cracking' && (
                                    <div className="text-center py-2">
                                        <div className="w-6 h-6 border-2 border-red-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                                        <span className="text-xs text-red-400 animate-pulse">TRYING PASSWORDS...</span>
                                    </div>
                                )}
                                {status === 'success' && (
                                    <div className="bg-green-500/10 border border-green-500/30 p-4 rounded text-center">
                                        <div className="text-[10px] text-green-500 uppercase font-bold mb-1">SUCCESS - KEY FOUND</div>
                                        <div className="text-xl font-mono text-white tracking-widest select-all">{result}</div>
                                    </div>
                                )}
                                {status === 'failed' && (
                                    <div className="bg-red-500/10 border border-red-500/30 p-3 rounded text-center">
                                        <div className="text-[10px] text-red-500 uppercase font-bold mb-1">ATTACK FAILED</div>
                                        <div className="text-xs text-zinc-400">{result}</div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const CryptoView = ({ onBack }) => {
            // ... (Keeping existing CryptoView logic mostly same, just styled)
            const [mode, setMode] = useState('symmetric');
            const [algo, setAlgo] = useState('aes');
            const [password, setPassword] = useState('');
            const [key, setKey] = useState('');
            const [inputText, setInputText] = useState('');
            const [inputFile, setInputFile] = useState(null);
            const [result, setResult] = useState('');
            const [generatedKeys, setGeneratedKeys] = useState(null);
            const [loading, setLoading] = useState(false);
            const [stegoMode, setStegoMode] = useState(false);
            const [stegoPassword, setStegoPassword] = useState('');

            const handleCryptoOp = async (operation) => {
                setLoading(true);
                setResult('');
                try {
                    const fd = new FormData();
                    if (inputFile) fd.append('file', inputFile);
                    if (inputText) fd.append('text', inputText);
                    
                    let endpoint = '';
                    if (mode === 'symmetric') {
                        endpoint = `/crypto/${operation}`;
                        fd.append('algorithm', algo);
                        fd.append('password', password);
                        if (operation === 'decrypt') {
                            fd.append('stego_mode', stegoMode);
                            if (stegoPassword) fd.append('stego_password', stegoPassword);
                        }
                    } else if (mode === 'asymmetric') {
                        endpoint = `/crypto/rsa/${operation}`;
                        if (operation === 'encrypt') fd.append('public_key', key);
                        if (operation === 'decrypt') fd.append('private_key', key);
                    } else if (mode === 'hash') endpoint = '/crypto/hash';

                    const res = await fetch(`${API_URL}${endpoint}`, { method: 'POST', body: fd });
                    const contentType = res.headers.get('content-type');
                    
                    if (contentType && contentType.includes('application/json')) {
                        const data = await res.json();
                        if (data.detail) throw new Error(data.detail);
                        setResult(data.result);
                    } else {
                        const blob = await res.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = `result_${operation}.bin`;
                        document.body.appendChild(a); a.click(); a.remove();
                        setResult("File downloaded successfully.");
                    }
                } catch (e) { setResult(`Error: ${e.message}`); } finally { setLoading(false); }
            };

            const generateKeys = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/crypto/rsa/keys`);
                    const data = await res.json();
                    setGeneratedKeys(data);
                } catch (e) { setResult(`Error: ${e.message}`); } finally { setLoading(false); }
            };

            return (
                <div className="h-full flex flex-col p-6">
                    <div className="flex items-center gap-4 mb-6 border-b border-white/10 pb-2">
                        <button onClick={onBack} className="p-1 text-zinc-500 hover:text-white transition-colors"><Icon name="arrow-left" size={16} /></button>
                        <div className="h-4 w-px bg-zinc-700"></div>
                        {['symmetric', 'asymmetric', 'hash'].map(m => (
                            <button key={m} onClick={() => { setMode(m); setResult(''); setInputFile(null); }} className={`text-xs font-bold uppercase tracking-wider px-2 py-1 transition-colors ${mode === m ? 'text-accent border-b-2 border-accent' : 'text-zinc-500 hover:text-zinc-300'}`}>{m}</button>
                        ))}
                    </div>

                    <div className="flex-1 overflow-auto">
                        <div className="max-w-2xl mx-auto space-y-6">
                            <div className="bg-panel panel-border p-6 rounded space-y-4">
                                {mode === 'symmetric' && (
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Algorithm</label>
                                                <select value={algo} onChange={(e) => setAlgo(e.target.value)} className="w-full bg-black/30 border border-zinc-700 text-xs text-white p-2 rounded focus:border-accent outline-none">
                                                    <option value="aes">AES-256-GCM</option>
                                                    <option value="chacha">ChaCha20-Poly1305</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Password</label>
                                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-black/30 border border-zinc-700 text-xs text-white p-2 rounded focus:border-accent outline-none" placeholder="Enter secure password"/>
                                            </div>
                                        </div>
                                        <div className="bg-zinc-900/50 p-3 rounded border border-zinc-800">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" checked={stegoMode} onChange={(e) => setStegoMode(e.target.checked)} className="accent-cyan-500"/>
                                                <span className="text-[10px] font-bold text-zinc-400 uppercase">Input is Stego Source</span>
                                            </label>
                                            {stegoMode && (
                                                <div className="mt-2 pl-6 animate-fade-in">
                                                    <input type="password" value={stegoPassword} onChange={(e) => setStegoPassword(e.target.value)} className="w-full bg-black/30 border border-zinc-700 text-xs text-white p-2 rounded focus:border-accent outline-none" placeholder="Stego Password (Optional)..."/>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                                {mode === 'asymmetric' && (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] text-zinc-500 font-bold uppercase">RSA-2048 Key (PEM)</label>
                                            <button onClick={generateKeys} className="text-[10px] text-accent hover:underline">Generate New Pair</button>
                                        </div>
                                        {generatedKeys && (
                                            <div className="bg-black/30 p-2 rounded border border-zinc-800 text-[10px] mono grid grid-cols-2 gap-2">
                                                <textarea readOnly className="h-20 bg-transparent text-green-500 resize-none outline-none" value={generatedKeys.public_key} />
                                                <textarea readOnly className="h-20 bg-transparent text-red-500 resize-none outline-none" value={generatedKeys.private_key} />
                                            </div>
                                        )}
                                        <textarea value={key} onChange={(e) => setKey(e.target.value)} className="w-full h-24 bg-black/30 border border-zinc-700 text-[10px] mono text-zinc-300 p-2 rounded focus:border-accent outline-none" placeholder="Paste Key..."/>
                                    </div>
                                )}
                                <div>
                                    <label className="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Input Data</label>
                                    <div className="space-y-2">
                                        <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full h-24 bg-black/30 border border-zinc-700 text-xs text-white p-2 rounded focus:border-accent outline-none placeholder-zinc-700" placeholder="Enter text..."/>
                                        <label className="flex items-center gap-2 cursor-pointer bg-zinc-800 hover:bg-zinc-700 p-2 rounded border border-zinc-700 transition-colors">
                                            <Icon name="upload" size={14} className="text-zinc-400"/>
                                            <span className="text-xs text-zinc-300 truncate flex-1">{inputFile ? inputFile.name : "Select file..."}</span>
                                            <input type="file" className="hidden" onChange={(e) => setInputFile(e.target.files[0])} />
                                            {inputFile && <span onClick={(e) => {e.preventDefault(); setInputFile(null)}} className="p-1 hover:text-red-500"><Icon name="x" size={12}/></span>}
                                        </label>
                                    </div>
                                </div>
                                <div className="flex gap-4 pt-2">
                                    {mode !== 'hash' ? (
                                        <>
                                            <button onClick={() => handleCryptoOp('encrypt')} disabled={loading} className="flex-1 bg-accent-low border border-accent text-accent hover:bg-accent hover:text-black py-2 rounded text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all">{loading ? "..." : "Encrypt"}</button>
                                            <button onClick={() => handleCryptoOp('decrypt')} disabled={loading} className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white py-2 rounded text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2">{loading ? "..." : "Decrypt"}</button>
                                        </>
                                    ) : (
                                        <button onClick={() => handleCryptoOp('hash')} disabled={loading} className="w-full bg-accent-low border border-accent text-accent hover:bg-accent hover:text-black py-2 rounded text-xs font-bold uppercase tracking-wider">{loading ? "..." : "Calculate Hash"}</button>
                                    )}
                                </div>
                            </div>
                            {result && (
                                <div className="bg-panel panel-border p-4 rounded animate-fade-in">
                                    <div className="text-[10px] font-bold text-zinc-500 uppercase mb-2">Output</div>
                                    <pre className="bg-black/50 p-3 rounded text-xs mono text-accent whitespace-pre-wrap break-all border border-zinc-800 max-h-40 overflow-auto">{result}</pre>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [fileId, setFileId] = useState(null);
            const [analyzing, setAnalyzing] = useState(false);
            const [rootResult, setRootResult] = useState(null);
            const [selectedNode, setSelectedNode] = useState(null);
            const [activeTab, setActiveTab] = useState('overview'); 
            const [logs, setLogs] = useState([]);
            const [previewImage, setPreviewImage] = useState(null);
            
            // New State for Features
            const [theme, setTheme] = useState('default');
            const [showConsole, setShowConsole] = useState(true);
            const [showCompare, setShowCompare] = useState(false);
            const [crackTarget, setCrackTarget] = useState(null);

            const addLog = (msg, type = 'info') => setLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), message: msg, type }].slice(-50));

            // Theme Effect
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            const cycleTheme = () => {
                const themes = ['default', 'matrix', 'obsidian'];
                const next = themes[(themes.indexOf(theme) + 1) % themes.length];
                setTheme(next);
                addLog(`Theme switched to ${next}`);
            };

            const loadFromHistory = async (id) => {
                setAnalyzing(true);
                addLog(`Retrieving analysis data for session ${id.slice(0, 8)}...`);
                try {
                    const res = await fetch(`${API_URL}/history/${id}`);
                    const data = await res.json();
                    if (data.detail) throw new Error(data.detail);
                    
                    setFile({ name: data.filename }); // Pseudo file object for UI
                    setFileId(data.id);
                    setRootResult(data.results);
                    setSelectedNode(data.results);
                    setActiveTab('overview');
                    addLog(`Successfully loaded history for ${data.filename}`, 'success');
                } catch (e) {
                    addLog(`Archive access failed: ${e.message}`, 'error');
                } finally {
                    setAnalyzing(false);
                }
            };

            const handleFile = async (e) => {
                if (e.target.files[0]) {
                    setFile(e.target.files[0]);
                    setFileId(null);
                    setRootResult(null);
                    addLog(`File loaded: ${e.target.files[0].name}`);
                }
            };

            const runAnalysis = async (fileToAnalyze = null) => {
                const targetFile = fileToAnalyze || file;
                if (!targetFile) return;
                
                setAnalyzing(true);
                if (!fileToAnalyze) {
                    setRootResult(null);
                    setSelectedNode(null);
                }
                
                addLog(`Starting forensic analysis on ${targetFile.name || "Main Evidence"}...`);

                const fd = new FormData();
                fd.append('file', targetFile);

                try {
                    const res = await fetch(`${API_URL}/analyze`, { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);
                    
                    // Always update state to the new analysis result
                    setFileId(data.id);
                    setRootResult(data.results);
                    setSelectedNode(data.results);
                    setActiveTab('overview'); // Reset to overview for the new file
                    
                    if (!fileToAnalyze) {
                        addLog("Root Analysis complete. Structure mapped.", 'success');
                    } else {
                        addLog(`Recursive analysis complete for ${targetFile.name}`, 'success');
                    }
                } catch (err) {
                    addLog(`Error: ${err.message}`, 'error');
                } finally {
                    setAnalyzing(false);
                }
            };

            const handleRescan = async (artifact) => {
                addLog(`Fetching artifact ${artifact.name} for recursive analysis...`);
                try {
                    const res = await fetch(`${API_URL}${artifact.url}`);
                    const blob = await res.blob();
                    // Create a File object from the blob so runAnalysis treats it as an upload
                    const fileObj = new File([blob], artifact.name, { type: blob.type || 'application/octet-stream' });
                    await runAnalysis(fileObj);
                } catch (e) {
                    addLog(`Failed to fetch artifact for scan: ${e.message}`, 'error');
                }
            };

            const handleCrack = (artifact) => {
                setCrackTarget(artifact);
                setActiveTab('tools');
                addLog(`Switching to Cracker for ${artifact.name}`);
            };

            const handleSteghideExtract = async (artifact, password) => {
                addLog(`Attempting Steghide extraction for ${artifact.name}...`);
                const formData = new FormData();
                formData.append('file_id', artifact.name.split('.')[0]); // Simple ID mapping
                formData.append('password', password);
                
                try {
                    const response = await fetch(`${API_URL}/extract/steghide`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) throw new Error('Incorrect password or extraction failed');
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `extracted_${artifact.name}`;
                    document.body.appendChild(a);
                    a.click();
                    addLog(`Successfully extracted ${artifact.name}!`, 'success');
                } catch (e) {
                    addLog(`Steghide Error: ${e.message}`, 'error');
                }
            };


            const renderContent = () => {
                if (activeTab === 'history') return <HistoryView onSelect={loadFromHistory} />;

                if (analyzing) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center text-accent">
                            <div className="w-16 h-16 border-2 border-accent border-t-transparent rounded-full animate-spin mb-4"></div>
                            <div className="text-xs font-bold tracking-[0.3em] animate-pulse">ANALYZING ARTIFACTS...</div>
                        </div>
                    );
                }

                if (!selectedNode) return (
                    <div className="h-full flex flex-col items-center justify-center text-zinc-700">
                        <Icon name="hard-drive" size={48} className="mb-4 opacity-20" />
                        <div className="text-xs font-bold tracking-wider mb-6">NO DATA LOADED</div>
                        <div className="flex gap-4">
                            <button onClick={() => document.getElementById('upload').click()} className="px-4 py-2 border border-zinc-800 hover:border-zinc-600 rounded text-[10px] uppercase font-bold text-zinc-500 hover:text-zinc-300 transition-all flex items-center gap-2">
                                <Icon name="upload" size={12}/> New Scan
                            </button>
                            <button onClick={() => setActiveTab('history')} className="px-4 py-2 border border-zinc-800 hover:border-zinc-600 rounded text-[10px] uppercase font-bold text-zinc-500 hover:text-zinc-300 transition-all flex items-center gap-2">
                                <Icon name="history" size={12}/> Open Archive
                            </button>
                        </div>
                    </div>
                );
                
                if (activeTab === 'crypto') return <CryptoView onBack={() => setActiveTab('overview')} />;
                if (activeTab === 'tools') return <ToolsView fileId={fileId} mime={crackTarget?.type || selectedNode.info?.mime || ''} initialFile={crackTarget} onBack={() => { setActiveTab('overview'); setCrackTarget(null); }} />;

                return (
                    <div className="h-full flex flex-col">
                        <div className="border-b border-white/10 p-4 bg-panel flex justify-between items-center">
                            <div>
                                <h2 className="text-sm font-bold text-main flex items-center gap-2">
                                    <Icon name={selectedNode.info?.mime.includes('image') ? 'image' : 'file'} size={16} className="text-accent"/>
                                    {selectedNode.filename}
                                </h2>
                                <div className="text-[10px] text-zinc-500 mono mt-1">
                                    {selectedNode.info?.mime} • Layer {selectedNode.depth}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {rootResult && selectedNode !== rootResult && (
                                    <button onClick={() => setShowCompare(true)} className="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-[10px] font-bold uppercase rounded flex items-center gap-1">
                                        <Icon name="git-compare" size={12}/> Compare Root
                                    </button>
                                )}
                                <div className={`px-3 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${
                                    selectedNode.findings.verdict === 'Stego Detected' ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 
                                    selectedNode.findings.verdict === 'Suspicious' ? 'bg-yellow-500/10 text-yellow-500 border border-yellow-500/20' : 
                                    'bg-green-500/10 text-green-500 border border-green-500/20'
                                }`}>
                                    {selectedNode.findings.verdict}
                                </div>
                            </div>
                        </div>

                        <div className="flex border-b border-white/10 bg-black/20">
                            {[
                                'overview', 
                                'artifacts', 
                                ...(selectedNode.confirmed_stego_artifacts?.length > 0 ? ['stego_only'] : []),
                                'hex', 
                                'strings_full', 
                                'entropy', 
                                'tools', 
                                'crypto'
                            ].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-3 text-[10px] font-bold uppercase tracking-wider transition-all border-b-2 ${activeTab === tab ? 'border-accent text-accent bg-accent-low' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}>
                                    {tab === 'tools' ? <span className="text-red-400 flex items-center gap-2"><Icon name="wrench" size={10}/> TOOLS</span> : 
                                     tab === 'crypto' ? <span className="text-violet-400 flex items-center gap-2"><Icon name="key" size={10}/> CRYPTO</span> :
                                     tab === 'artifacts' ? <span className="flex items-center gap-2"><Icon name="package" size={10}/> ARTIFACTS</span> :
                                     tab === 'stego_only' ? <span className="text-red-500 flex items-center gap-2 font-black"><Icon name="alert-circle" size={10}/> STEGO ONLY</span> :
                                     tab === 'strings_full' ? 'Strings (Full)' : tab}
                                </button>
                            ))}
                        </div>

                        <div className="flex-1 overflow-auto relative">
                            {activeTab === 'overview' && (
                                <div className="p-6 space-y-6 animate-fade-in">
                                    <div className="grid grid-cols-3 gap-4">
                                        <StatCard label="MIME Type" value={selectedNode.info?.mime || 'Unknown'} color="text-white" />
                                        <StatCard label="Analysis Depth" value={`Level ${selectedNode.depth}`} color="text-accent" />
                                        <StatCard label="Detected Issues" value={selectedNode.findings.details.length} color={selectedNode.findings.details.length > 0 ? "text-yellow-500" : "text-zinc-500"} />
                                    </div>
                                    <div className="bg-panel panel-border rounded overflow-hidden">
                                        <div className="bg-black/20 p-2 px-4 text-[10px] font-bold text-zinc-500 uppercase border-b border-white/10">Detailed Findings</div>
                                        <div className="divide-y divide-white/10">
                                            {selectedNode.findings.details.map((d, i) => (
                                                <div key={i} className="p-3 flex items-start gap-3">
                                                    <Icon name={d.severity === 'danger' ? 'alert-octagon' : 'alert-triangle'} size={14} className={d.severity === 'danger' ? 'text-red-500' : 'text-yellow-500'} />
                                                    <span className="text-xs text-zinc-300">{d.message}</span>
                                                </div>
                                            ))}
                                            {selectedNode.findings.details.length === 0 && <div className="p-4 text-center text-xs text-zinc-600">No specific anomalies detected.</div>}
                                        </div>
                                    </div>
                                    {/* Treemap for Complex files */}
                                    {selectedNode.nested && selectedNode.nested.length > 0 && (
                                        <div className="h-64 bg-panel panel-border rounded p-4 flex flex-col">
                                            <div className="text-[10px] font-bold text-zinc-500 uppercase mb-2">Structure Visualization</div>
                                            <div className="flex-1 min-h-0">
                                                <FileTreeMap rootNode={selectedNode} onSelect={setSelectedNode} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                            {activeTab === 'artifacts' && <ArtifactsView artifacts={selectedNode.findings.artifacts} onPreview={setPreviewImage} onRescan={handleRescan} onCrack={handleCrack} />}
                            {activeTab === 'stego_only' && <ArtifactsView artifacts={selectedNode.confirmed_stego_artifacts} onPreview={setPreviewImage} onRescan={handleRescan} onCrack={handleCrack} />}
                            {activeTab === 'hex' && <HexViewer file={selectedNode === rootResult ? file : null} url={selectedNode !== rootResult ? `${API_URL}${selectedNode.url || ""}` : null} />}
                            {activeTab === 'strings_full' && <RawStringsViewer file={selectedNode === rootResult ? file : null} url={selectedNode !== rootResult ? `${API_URL}${selectedNode.url || ""}` : null} />}
                            {activeTab === 'entropy' && <EntropyView data={selectedNode.telemetry?.entropy_map} />}
                        </div>
                    </div>
                );
            };

            return (
                <ErrorBoundary>
                    <div className="flex flex-col h-full">
                        <header className="h-14 border-b border-white/10 bg-panel flex items-center justify-between px-6 shrink-0 z-10 shadow-lg">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-gradient-to-br from-cyan-600 to-blue-700 rounded flex items-center justify-center shadow-lg shadow-cyan-900/20">
                                    <Icon name="shield-check" className="text-white" size={18} />
                                </div>
                                <div>
                                    <h1 className="text-sm font-black tracking-wide text-white uppercase">StegGuard <span className="text-accent font-normal">Pro</span></h1>
                                    <p className="text-[9px] text-zinc-500 font-bold tracking-[0.2em] uppercase">Forensic Analysis Suite</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setActiveTab('history')} className={`p-2 transition-colors ${activeTab === 'history' ? 'text-accent' : 'text-zinc-500 hover:text-white'}`} title="Forensic Archive">
                                    <Icon name="archive" size={16} />
                                </button>
                                <button onClick={cycleTheme} className="p-2 text-zinc-500 hover:text-white transition-colors" title="Switch Theme">
                                    <Icon name={theme === 'default' ? 'moon' : theme === 'matrix' ? 'code' : 'flame'} size={16} />
                                </button>
                                <button onClick={() => setShowConsole(!showConsole)} className={`p-2 transition-colors ${showConsole ? 'text-accent' : 'text-zinc-500'}`} title="Toggle Console">
                                    <Icon name="terminal" size={16} />
                                </button>
                                {fileId && (
                                    <a href={`${API_URL}/report/${fileId}`} target="_blank" className="bg-zinc-700 hover:bg-zinc-600 text-white text-[10px] font-bold px-4 py-2 rounded uppercase tracking-wider flex items-center gap-2 transition-all border border-zinc-600">
                                        <Icon name="file-text" size={14} /> PDF Report
                                    </a>
                                )}
                                {rootResult && (
                                    <button 
                                        onClick={() => {
                                            setFile(null);
                                            setFileId(null);
                                            setRootResult(null);
                                            setSelectedNode(null);
                                            setActiveTab('overview');
                                            addLog("Session reset. Ready for new evidence.");
                                        }} 
                                        className="bg-accent-low border border-accent text-accent hover:bg-accent hover:text-black text-[10px] font-bold px-4 py-2 rounded uppercase tracking-wider flex items-center gap-2 transition-all"
                                    >
                                        <Icon name="plus" size={14} /> New Upload
                                    </button>
                                )}
                                {!file && (
                                    <button onClick={() => document.getElementById('upload').click()} className="bg-accent-low border border-accent text-accent hover:bg-accent hover:text-black text-[10px] font-bold px-4 py-2 rounded uppercase tracking-wider flex items-center gap-2 transition-all">
                                        <Icon name="upload" size={14} /> Load Evidence
                                    </button>
                                )}
                                {file && !analyzing && !rootResult && (
                                    <button onClick={() => runAnalysis()} className="bg-green-600 hover:bg-green-500 text-white text-[10px] font-bold px-4 py-2 rounded uppercase tracking-wider flex items-center gap-2 transition-all">
                                        <Icon name="play" size={14} /> Execute Scan
                                    </button>
                                )}
                                <input type="file" id="upload" className="hidden" onChange={handleFile} />
                            </div>
                        </header>

                        <div className="flex flex-1 overflow-hidden">
                            <aside className="w-64 bg-black/20 border-r border-white/10 flex flex-col shrink-0">
                                <div className="p-4 border-b border-white/10">
                                    <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Evidence Tree</h3>
                                    {rootResult ? (
                                        <div className="space-y-1">
                                            <RecursiveFileTree node={rootResult} activeId={selectedNode ? selectedNode.filename + selectedNode.depth : ''} onSelect={setSelectedNode} />
                                        </div>
                                    ) : <div className="text-zinc-700 text-xs italic p-2">Waiting for analysis...</div>}
                                </div>
                            </aside>
                            <main className="flex-1 flex flex-col min-w-0 relative">
                                {analyzing && <div className="scan-line"></div>}
                                {renderContent()}
                            </main>
                        </div>
                        
                        <ConsoleLog logs={logs} visible={showConsole} onClose={() => setShowConsole(false)} />
                        <ImageModal url={previewImage} onClose={() => setPreviewImage(null)} />
                        <MetadataCompareModal visible={showCompare} rootNode={rootResult} selectedNode={selectedNode} onClose={() => setShowCompare(false)} />
                    </div>
                </ErrorBoundary>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
